name: MinGW64 heavy debug

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Don't let git mangle line endings
        shell: bash
        run: git config --global core.autocrlf input

      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git make autoconf automake
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-libslirp
            mingw-w64-x86_64-libtool
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-ncurses

      - name: Build with heavy debugger
        run: ./build-mingw --enable-debug=heavy

      - name: Confirm heavy debugger actually got enabled
        run: grep '^#define C_HEAVY_DEBUG' config.h

      - name: Stage exe + runtime DLLs
        run: |
          mkdir -p dist
          cp src/dosbox-x.exe dist/
          cp dosbox-x.reference.conf dist/ || true
          ldd src/dosbox-x.exe | grep -i '/mingw64/bin' \
            | awk '{print $3}' | sort -u | xargs -I{} cp -n {} dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dosbox-x-mingw64-heavydebug
          path: dist/
